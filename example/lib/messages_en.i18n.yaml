    title: Components
    subtitle: Time Picker
    breadcrumb: Time selection
    cardTitle: Time Picker API and variations
    tabOverview: Overview
    tabApi: API
    intro: The time picker uses a Limitless-inspired dial for hour and minute selection with ngModel integration.
    descriptionTitle: Description
    descriptionBody: The component fits scheduling, review, publishing, and operating-hour flows with a light, direct overlay.
    featuresTitle: Features
    featureOne: Direct ngModel binding with Duration?.
    featureTwo: Clock-based selection switching between hour and minute.
    featureThree: Support for 12-hour AM/PM and 24-hour display modes.
    limitsTitle: Limitations
    limitOne: The displayed format depends on use24Hour and the configured locale.
    limitTwo: It does not apply business window rules on its own.
    limitThree: The returned value carries only hour and minute.
    twentyFourHourTitle: 24-hour time picker
    twentyFourHourPlaceholder: Select time
    twentyFourHourCurrentLabel: Current time
    twentyFourHourHelp: Use use24Hour to display and edit the value without AM/PM.
    defaultTitle: Default time picker
    englishTitle: English time picker
    disabledTitle: Disabled time picker
    placeholder: Select time
    englishPlaceholder: Select time
    disabledPlaceholder: Locked time
    currentLabel: Current time
    reviewLabel: Review time
    disabledLabel: Locked time
    defaultHelp: Click the hour block first and the minute block next to refine the selection.
    englishHelp: Locale switches the placeholder and helper texts used by the panel.
    disabledHelp: The field keeps displaying the value without opening the overlay.
    notesTitle: Usage notes
    notesBody: The component returns a Duration normalized to the minutes of the day, which fits forms and filters without carrying a full date.
    noneSelected: No time selected
    apiIntro: Use li-time-picker when the form needs only a time value, without an associated date, while keeping ngModel integration.
    apiInputsTitle: Main inputs
    apiInputOne: The ngModel binding works with Duration?.
    apiInputTwo: locale adjusts the placeholder and panel labels.
    apiInputThree: disabled prevents opening the clock.
    apiBehaviorTitle: Behavior
    apiBehaviorOne: Click the clock to select the hour and then the minute.
    apiBehaviorTwo: The OK button confirms the selection and emits valueChange and ngModel.
    apiBehaviorThree: AM and PM switch the half of the day without rebuilding the value manually.
    apiUsageExample: |
      // Usage example
      selectedTime = const Duration(hours: 10, minutes: 48);

      <li-time-picker
        [(ngModel)]="selectedTime"
        locale="en_US">
      </li-time-picker>
  datePicker:
    title: Components
    subtitle: Date Picker
    breadcrumb: Single date selection
    cardTitle: Date Picker API and variations
    tabOverview: Overview
    tabApi: API
    tabVariations: Variations
    intro: This page is dedicated to li-date-picker, focusing on single-date flows, quick month/year navigation, locale, and common field states.
    descriptionTitle: Description
    descriptionBody: The date picker fits single-date flows such as scheduling, publication, due dates, and punctual filters without mixing responsibilities with the range selector.
    featuresTitle: Features
    featureOne: Direct ngModel binding with DateTime?.
    featureTwo: Restriction through minDate and maxDate.
    featureThree: Immediate apply on day click.
    featureFour: Direct month and year navigation inside the overlay.
    limitsTitle: Limitations
    limitOne: It does not replace specific business calendar rules.
    limitTwo: Special rules such as holidays and blocked dates still belong in the parent component.
    limitThree: Special dates and messages remain the parent component's responsibility.
    ngModelTitle: Date picker with ngModel
    restrictedTitle: Restricted date picker
    englishLocaleTitle: Date picker in English
    disabledTitle: Disabled date picker
    placeholder: Select a date
    restrictedPlaceholder: Allowed window
    englishPlaceholder: Choose a date
    disabledPlaceholder: Locked field
    currentDateLabel: Current date
    restrictedLabel: Restricted date
    englishLabel: EN date
    disabledLabel: Locked value
    defaultHelp: Click the calendar header to jump quickly between month and year.
    restrictedHelp: This example limits selection between minDate and maxDate.
    englishHelp: Locale switches calendar labels and the displayed date format.
    disabledHelp: The field keeps the current value readable without opening the overlay.
    noneSelected: No date selected
    partialRange: Partial or undefined period
    apiIntro: Use li-date-picker when the flow depends on a single date with a light overlay, ngModel, locale, and basic constraints.
    apiInputsTitle: Main inputs
    apiInputOne: The [(ngModel)] binding works with DateTime?.
    apiInputTwo: "[minDate] and [maxDate] constrain the navigable and selectable window."
    apiInputThree: "locale adjusts labels and the visual date format."
    apiInputFour: "[disabled] prevents opening and selection."
    apiBehaviorTitle: Behavior
    apiBehaviorOne: Clicking a day applies immediately and closes the overlay.
    apiBehaviorTwo: Clicking the calendar title cycles between day, month, and year views.
    apiBehaviorThree: clear() remains available in the footer to reset the current value.
    apiBehaviorFour: valueChange and ngModel receive the normalized date without time.
    apiUsageExample: |
      // Usage example
      selectedDate = DateTime(2026, 3, 20);

      <li-date-picker
        [(ngModel)]="selectedDate"
        [minDate]="DateTime(2026, 3, 1)"
        [maxDate]="DateTime(2026, 3, 31)"
        locale="en_US">
      </li-date-picker>
    variationStandardTitle: Default flow
    variationStandardBody: Best fit for forms where the user picks a date and moves on without extra confirmation.
    variationLocaleTitle: Visual locale
    variationLocaleBody: The same API switches labels, months, and displayed format between Portuguese and English.
    variationDisabledTitle: Locked state
    variationDisabledBody: Preserves the rendered value when the date is informative and cannot be edited.
  carousel:
