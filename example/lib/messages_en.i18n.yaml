    gridCardEightBody: Side controls stay predictable because the row lives inside the item.
    gridCardNineTitle: Correct structure
    gridCardNineBody: The item remains the real slide; the grid is only internal content.
    fadeTitle: Carousel with Fade
    fadeSubtitle: Switches slides through opacity instead of lateral movement, useful for hero banners and caption-heavy content.
    fadeSlideOneLabel: Fade 1
    fadeSlideOneTitle: Editorial fade
    fadeSlideOneBody: The slide enters through opacity without competing for attention with horizontal movement.
    fadeSlideTwoLabel: Fade 2
    fadeSlideTwoTitle: Cleaner reading
    fadeSlideTwoBody: Works well when the image already has a lot of texture and you want a more discreet transition.
    fadeSlideThreeLabel: Fade 3
    fadeSlideThreeTitle: Smooth transition
    fadeSlideThreeBody: Controls, indicators, and autoplay stay the same; only the visual language of the transition changes.
    zoomTitle: Carousel with Zoom
    zoomSubtitle: Scale and opacity on entry for a more cinematic feeling without changing the component structure.
    zoomSlideOneLabel: Zoom 1
    zoomSlideOneTitle: Zoom in
    zoomSlideOneBody: The next slide enters at a larger scale and settles into the main plane by the end of the transition.
    zoomSlideTwoLabel: Zoom 2
    zoomSlideTwoTitle: Visual emphasis
    zoomSlideTwoBody: A good variation for campaign showcases, portfolios, or more editorial screens.
    zoomSlideThreeLabel: Zoom 3
    zoomSlideThreeTitle: Same markup
    zoomSlideThreeBody: "The API remains the same: the effect changes through input, without alternate item markup."
    verticalTitle: Vertical Carousel
    verticalSubtitle: The transition happens on the Y axis, useful when the page composition already has a lot of horizontal movement.
    verticalSlideOneLabel: Vertical 1
    verticalSlideOneTitle: Vertical displacement
    verticalSlideOneBody: The carousel behavior stays the same, but the perception changes completely.
    verticalSlideTwoLabel: Vertical 2
    verticalSlideTwoTitle: Alternate flow
    verticalSlideTwoBody: This mode can pair better with column-based layouts and more documentary content.
    verticalSlideThreeLabel: Vertical 3
    verticalSlideThreeTitle: Consistent API
    verticalSlideThreeBody: Just like zoom, the change is encapsulated in the component and can be reused on other screens.
    blurTitle: Carousel with Blur
    blurSubtitle: A transition with blur and opacity that softens the exchange between more detailed images.
    blurSlideOneLabel: Blur 1
    blurSlideOneTitle: Diffused entry
    blurSlideOneBody: The slide emerges with reduced blur and growing opacity, creating a more atmospheric change.
    blurSlideTwoLabel: Blur 2
    blurSlideTwoTitle: Texture under control
    blurSlideTwoBody: This mode works well when the photography has a lot of detail and pure fade feels too subtle.
    blurSlideThreeLabel: Blur 3
    blurSlideThreeTitle: Reusable variation
    blurSlideThreeBody: The effect remains encapsulated in the component and can be applied to any carousel through input.
    parallaxTitle: Carousel with Parallax
    parallaxSubtitle: Shifts the image with apparent depth, creating a more spatial transition between slides.
    parallaxSlideOneLabel: Parallax 1
    parallaxSlideOneTitle: Lateral depth
    parallaxSlideOneBody: The slide enters with displacement and slightly larger scale, suggesting a moving background plane.
    parallaxSlideTwoLabel: Parallax 2
    parallaxSlideTwoTitle: Editorial motion
    parallaxSlideTwoBody: This mode works well in visual showcases and pages where the image change should feel more physical.
    parallaxSlideThreeLabel: Parallax 3
    parallaxSlideThreeTitle: Subtle layers
    parallaxSlideThreeBody: The parallax feel stays subtle and reusable without requiring special item markup.
