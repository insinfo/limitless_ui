    overviewIntro: The multi-select demo shows multiple selection with a stable dataSource, manual projection, and documentation organized between overview and API.
    descriptionTitle: Description
    descriptionBody: The component keeps a collection of selected values and projects the result directly in the trigger.
    featuresTitle: Features
    featureOne: Multiple selection with badges and placeholder.
    featureTwo: Clear-selection button next to the arrow when values are selected.
    featureThree: Integration with dataSource or li-multi-option.
    featureFour: Direct binding with ngModel lists.
    limitsTitle: Limitations
    limitOne: Avoid recreating option lists in reactive getters.
    limitTwo: The overlay needs a consistent refresh when the selection changes.
    limitThree: For very large collections, keep pagination or search in the parent.
    apiTitle: How to use
    apiIntroOne: li-multi-select follows the same strategy as li-select, but keeps multiple selected values and renders badges in the trigger.
    apiIntroTwo: The recommended pattern for the demo and production is to keep dataSource stable and update only the selected values collection.
    apiDataSource: external option list.
    apiLabelKey: key used for visible text.
    apiValueKey: key used in the ngModel array.
    apiNgModel: list of selected values.
    apiPlaceholder: text shown when nothing is selected.
    apiShowClearButton: shows the X button to clear everything in the trigger.
    notesTitle: Notes and limits
    noteOne: Do not recreate the option list in reactive getters.
    noteTwo: Schedule overlay.update() on a future frame when the selection changes.
    noteThree: Calculate maxHeight from the viewport, not from the current panel height.
