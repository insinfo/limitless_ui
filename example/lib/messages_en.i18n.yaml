    tabOverview: Overview
    tabApi: API
    tabTroubleshooting: Troubleshooting
    apiInputs: Most used inputs
    troubleshootingIntro: Common issues seen in this component and how to avoid them
    overviewIntro: The select demo shows stable dataSource usage and manual option projection, bringing description, features, limitations, and visible examples together in the same flow.
    descriptionTitle: Description
    descriptionBody: The component solves simple selection with overlay, projected options, and direct ngModel binding.
    featuresTitle: Features
    featureOne: External source through dataSource.
    featureTwo: Manual projection with li-option.
    featureThree: Placeholder, disabled items, and simple binding.
    limitsTitle: Limitations
    limitOne: Avoid recreating dataSource in reactive getters.
    limitTwo: The overlay depends on consistent options for navigation and height.
    limitThree: For heavy filtering logic, keep orchestration in the parent component.
    apiTitle: How to use
    apiIntro: li-select accepts both [dataSource] and li-option projection. To avoid freezes and unnecessary render cycles, prefer providing stable lists from the parent component instead of getters that recreate the array whenever state changes.
    apiDataSource: external option list.
    apiLabelKey: key used for visible text.
    apiValueKey: key used as the ngModel value.
    apiDisabledKey: boolean key used to disable items.
    apiNgModel: selected value.
    apiPlaceholder: text shown when empty.
    notesTitle: Notes and limits
    noteOne: Do not recreate dataSource in getters.
    noteTwo: The overlay should not calculate height from its own rendered panel.
    noteThree: Global keyboard events should handle only navigation and escape.
