<div class="demo-page">
  <div class="page-header page-header-light shadow-sm rounded-0 border">
    <div class="page-header-content d-lg-flex">
      <div class="d-flex">
        <h4 class="page-title mb-0">{{ t.pages.helpers.title }} <span class="fw-normal">{{ t.pages.helpers.subtitle
            }}</span></h4>
      </div>
    </div>
    <div class="page-header-content d-lg-flex border-top">
      <demo-page-breadcrumb [currentLabel]="t.pages.helpers.breadcrumb"></demo-page-breadcrumb>
    </div>
  </div>

  <div class="content">
    <div class="card">

      <li-tabsx type="tabs">
        <li-tabx [header]="t.common.tabOverview" [active]="true">
          <div class="card-body">
            <p class="text-muted mb-0">{{ overviewIntro }}</p>
         
            <div class="row">
              <div class="col-xl-6">
                <div class="card">
                  <div class="card-header">
                    <h5 class="mb-0">{{ t.pages.helpers.loadingTitle }}</h5>
                  </div>
                  <div class="card-body">
                    <button class="btn btn-light mb-3" type="button" (click)="showLoadingOverlay()">
                      {{ t.pages.helpers.showOverlay }}
                    </button>

                    <div #loadingHost class="demo-loading-host d-flex align-items-center justify-content-center">
                      <div class="text-center">
                        <div class="fw-semibold">{{ t.pages.helpers.loadingTarget }}</div>
                        <div class="text-muted">{{ t.pages.helpers.loadingTargetHelp }}</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-xl-6">
                <div class="card">
                  <div class="card-header">
                    <h5 class="mb-0">{{ t.pages.helpers.actionTitle }}</h5>
                  </div>
                  <div class="card-body">
                    <div class="demo-action-grid">
                      <button class="btn btn-primary" type="button" (click)="showDialogAlert()">{{
                        t.pages.helpers.dialogAlert }}</button>
                      <button class="btn btn-outline-primary" type="button" (click)="showDialogConfirm()">{{
                        t.pages.helpers.dialogConfirm }}</button>
                      <button #simplePopoverButton class="btn btn-light" type="button"
                        (click)="showSimplePopover(simplePopoverButton)">{{ t.pages.helpers.simplePopover }}</button>
                      <button #sweetPopoverButton class="btn btn-light" type="button"
                        (click)="showSweetPopover(sweetPopoverButton)">{{ t.pages.helpers.sweetPopover }}</button>
                      <button class="btn btn-success" type="button" (click)="showSimpleSuccessToast()">{{
                        t.pages.helpers.simpleSuccessToast }}</button>
                      <button class="btn btn-warning" type="button" (click)="showSimpleWarningToast()">{{
                        t.pages.helpers.simpleWarningToast }}</button>
                      <button class="btn btn-outline-success" type="button" (click)="showSweetSuccessToast()">{{
                        t.pages.helpers.sweetSuccessToast }}</button>
                      <button class="btn btn-outline-warning" type="button" (click)="showSweetWarningToast()">{{
                        t.pages.helpers.sweetWarningToast }}</button>
                      <button class="btn btn-outline-info" type="button" (click)="showSweetModal()">{{
                        t.pages.helpers.sweetModal }}</button>
                      <button class="btn btn-outline-dark" type="button" (click)="showSweetConfirm()">{{
                        t.pages.helpers.sweetConfirm }}</button>
                      <button class="btn btn-info" type="button" (click)="showSweetPrompt()">{{
                        t.pages.helpers.sweetPrompt }}</button>
                      <button class="btn btn-outline-danger" type="button" (click)="showSweetErrorToast()">{{
                        t.pages.helpers.sweetErrorToast }}</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="demo-summary-box">{{ helperState.isEmpty ? t.pages.helpers.idle : helperState }}</div>
          </div>
        </li-tabx>
      </li-tabsx>
    </div>
  </div>
</div>
