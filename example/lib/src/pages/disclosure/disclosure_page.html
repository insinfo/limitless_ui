<div class="demo-page">
  <div class="page-header page-header-light shadow-sm rounded-0 border">
    <div class="page-header-content d-lg-flex">
      <div class="d-flex">
        <h4 class="page-title mb-0">{{ pageTitle }} <span class="fw-normal">{{ pageSubtitle }}</span></h4>
      </div>
    </div>
    <div class="page-header-content d-lg-flex border-top">
      <demo-page-breadcrumb [currentLabel]="breadcrumb"></demo-page-breadcrumb>
    </div>
  </div>

  <div class="content">
    <div class="card">
     
      <li-tabsx type="tabs">
        <li-tabx [header]="overviewTab" [active]="true">
          <div class="card-body">
            <p class="text-muted mb-0">{{ intro }}</p>
          </div>
        </li-tabx>
        <li-tabx [header]="examplesTab">
          <div class="card-body">
            <div class="row">
              <div class="col-xl-6">
                <div class="card">
                  <div class="card-header">
                    <h5 class="mb-0">{{ accordionTitle }}</h5>
                  </div>
                  <div class="card-body">
                    <p class="text-muted">{{ accordionBody }}</p>

                    <li-accordion [allowMultipleOpen]="true">
                      <li-accordion-item [header]="collapsedStateTitle" [description]="collapsedStateDescription">
                        {{ collapsedStateBody }}
                      </li-accordion-item>
                      <li-accordion-item [header]="expandedStateTitle" [description]="expandedStateDescription" [expanded]="true">
                        {{ expandedStateBody }}
                      </li-accordion-item>
                      <li-accordion-item [header]="alwaysOpenTitle" [description]="alwaysOpenDescription">
                        {{ alwaysOpenBody }}
                      </li-accordion-item>
                    </li-accordion>
                  </div>
                </div>
              </div>

              <div class="col-xl-6">
                <div class="card">
                  <div class="card-header">
                    <h5 class="mb-0">{{ tabsModalTitle }}</h5>
                  </div>
                  <div class="card-body">
                    <li-tabsx type="pills">
                      <li-tabx [header]="tokensTab" [active]="true">
                        <div class="p-3">
                          {{ tokensBody }}
                        </div>
                      </li-tabx>
                      <li-tabx [header]="flowTab">
                        <div class="p-3">
                          {{ flowBody }}
                        </div>
                      </li-tabx>
                      <li-tabx [header]="actionsTab">
                        <div class="p-3">
                          <button class="btn btn-primary" type="button" (click)="openModal()">{{ openModalLabel }}</button>
                        </div>
                      </li-tabx>
                    </li-tabsx>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </li-tabx>
      </li-tabsx>
    </div>
  </div>

  <li-modal #demoModal [title-text]="modalTitle" headerColor="indigo" [enableShadow]="true" [verticalCenter]="true">
    <h5>{{ modalHeading }}</h5>
    <p>{{ modalBody }}</p>
    <div class="text-end">
      <button class="btn btn-light" type="button" (click)="demoModal?.close()">{{ closeLabel }}</button>
    </div>
  </li-modal>
</div>
