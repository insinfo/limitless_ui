    tabTroubleshooting: Solução de problemas
    apiInputs: Inputs mais usados
    troubleshootingIntro: Erros que já apareceram neste componente e como evitar
    overviewIntro: A demo de select mostra uso com dataSource estável e com projeção manual de opções, reunindo descrição, recursos, limitações e exemplos visíveis no mesmo fluxo.
    descriptionTitle: Descrição
    descriptionBody: O componente resolve seleção simples com overlay, opção projetada e ligação direta ao ngModel.
    featuresTitle: Recursos
    featureOne: Fonte externa com dataSource.
    featureTwo: Projeção manual com li-option.
    featureThree: Placeholder, itens desabilitados e binding simples.
    limitsTitle: Limitações
    limitOne: Evite recriar o dataSource em getters reativos.
    limitTwo: O overlay depende de opções consistentes para navegação e altura.
    limitThree: Para lógica pesada de filtro, mantenha a orquestração no componente pai.
    apiTitle: Como utilizar
    apiIntro: li-select aceita tanto [dataSource] quanto projeção com li-option. Para evitar travamentos e ciclos de renderização desnecessários, prefira fornecer listas estáveis no componente pai, em vez de getters que recriam o array a cada mudança de estado.
    apiDataSource: lista de opções externas.
    apiLabelKey: chave usada para o texto visível.
    apiValueKey: chave usada como valor do ngModel.
    apiDisabledKey: chave booleana para desabilitar itens.
    apiNgModel: valor selecionado.
    apiPlaceholder: texto exibido quando vazio.
    notesTitle: Observações e limites
    noteOne: Não recrie o dataSource em getters.
    noteTwo: O overlay não deve calcular altura com base no próprio painel renderizado.
    noteThree: Eventos globais de teclado devem tratar apenas navegação e escape.
