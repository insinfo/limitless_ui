    tabApi: API
    tabTroubleshooting: Solução de problemas
    apiInputs: Inputs mais usados
    troubleshootingIntro: Cuidados importantes para evitar regressões
    overviewIntro: A demo de multiseleção mostra seleção múltipla com dataSource estável, projeção manual e documentação organizada entre visão geral e API.
    descriptionTitle: Descrição
    descriptionBody: O componente mantém uma coleção de valores selecionados e projeta o resultado diretamente no trigger.
    featuresTitle: Recursos
    featureOne: Seleção múltipla com badges e placeholder.
    featureTwo: Botão de limpar seleção ao lado da seta quando há valores marcados.
    featureThree: Integração com dataSource ou li-multi-option.
    featureFour: Binding direto com listas no ngModel.
    limitsTitle: Limitações
    limitOne: Evite recriar listas de opções em getters reativos.
    limitTwo: O overlay precisa de atualização consistente ao mudar a seleção.
    limitThree: Para coleções muito grandes, mantenha paginação ou busca no pai.
    apiTitle: Como utilizar
    apiIntroOne: li-multi-select segue a mesma estratégia do li-select, mas mantém múltiplos valores selecionados e renderiza badges no trigger.
    apiIntroTwo: O padrão recomendado para o demo e para produção é manter dataSource estável e atualizar apenas a coleção de valores selecionados.
    apiDataSource: lista de opções externas.
    apiLabelKey: chave usada para o texto visível.
    apiValueKey: chave usada no array do ngModel.
    apiNgModel: lista de valores selecionados.
    apiPlaceholder: texto quando nada está marcado.
    apiShowClearButton: mostra o X para limpar tudo no trigger.
    notesTitle: Observações e limites
    noteOne: Não recrie a lista de opções em getters reativos.
    noteTwo: Agende overlay.update() em frame futuro ao mudar a seleção.
    noteThree: Calcule maxHeight pelo viewport, não pela altura atual do painel.
