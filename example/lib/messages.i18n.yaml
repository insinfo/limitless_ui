  timePicker:
    title: Componentes
    subtitle: Time Picker
    breadcrumb: Seleção de horário
    cardTitle: API e variações do Time Picker
    tabOverview: Visão geral
    tabApi: API
    intro: O time picker usa um dial inspirado no Limitless para seleção de hora e minuto com integração via ngModel.
    descriptionTitle: Descrição
    descriptionBody: O componente atende fluxos de agendamento, revisão, publicação e horários de operação com um overlay leve e direto.
    featuresTitle: Recursos
    featureOne: Binding direto com ngModel em Duration?.
    featureTwo: Seleção por relógio com alternância entre hora e minuto.
    featureThree: Toggle AM/PM integrado no próprio painel.
    limitsTitle: Limitações
    limitOne: O componente trabalha no formato de 12 horas com AM e PM.
    limitTwo: Não aplica regras de janela de negócio por conta própria.
    limitThree: O valor retornado considera apenas hora e minuto.
    defaultTitle: Time picker padrão
    englishTitle: Time picker em inglês
    disabledTitle: Time picker desabilitado
    placeholder: Selecione um horário
    englishPlaceholder: Select time
    disabledPlaceholder: Horário bloqueado
    currentLabel: Horário atual
    reviewLabel: Horário de revisão
    disabledLabel: Horário bloqueado
    defaultHelp: Clique no bloco de hora para trocar a hora e no de minuto para refinar os minutos.
    englishHelp: O locale troca placeholder e textos auxiliares do painel.
    disabledHelp: O campo continua exibindo o valor sem abrir o overlay.
    notesTitle: Observações de uso
    notesBody: O componente retorna Duration normalizada em minutos do dia, o que facilita uso com formulários e filtros sem carregar uma data completa.
    noneSelected: Nenhum horário selecionado
    apiIntro: Use o li-time-picker quando o formulário precisa escolher apenas um horário, sem data associada, mantendo integração com ngModel.
    apiInputsTitle: Inputs principais
    apiInputOne: O binding ngModel trabalha com Duration?.
    apiInputTwo: locale ajusta placeholder e textos do painel.
    apiInputThree: disabled impede a abertura do relógio.
    apiBehaviorTitle: Comportamento
    apiBehaviorOne: Clique no relógio para selecionar a hora e depois o minuto.
    apiBehaviorTwo: O botão OK confirma a seleção e emite valueChange e ngModel.
    apiBehaviorThree: AM e PM alteram a metade do dia sem recriar o valor manualmente.
    apiUsageExample: |
      // Exemplo de uso
      selectedTime = const Duration(hours: 10, minutes: 48);

      <li-time-picker
        [(ngModel)]="selectedTime"
        locale="pt_BR">
      </li-time-picker>
  datePicker:
    title: Componentes
    subtitle: Date Picker
    breadcrumb: Seleção de data única
    cardTitle: API e variações do Date Picker
    tabOverview: Visão geral
    tabApi: API
    tabVariations: Variações
    intro: Esta página é dedicada ao li-date-picker, com foco em data única, troca rápida por mês/ano, locale e estados comuns do campo.
    descriptionTitle: Descrição
    descriptionBody: O date picker atende fluxos de data única como agendamento, publicação, vencimento e filtros pontuais, sem misturar responsabilidades com o seletor de intervalo.
    featuresTitle: Recursos
    featureOne: Binding direto com ngModel em DateTime?.
    featureTwo: Restrição por minDate e maxDate.
    featureThree: Aplicação imediata ao clicar no dia.
    featureFour: Navegação direta por mês e ano no overlay.
    limitsTitle: Limitações
    limitOne: Não substitui regras de negócio específicas de calendário.
    limitTwo: Regras especiais como feriados e datas bloqueadas continuam no componente pai.
    limitThree: Datas e mensagens especiais continuam responsabilidade do componente pai.
    ngModelTitle: Date picker com ngModel
    restrictedTitle: Date picker com restrição
    englishLocaleTitle: Date picker em inglês
    disabledTitle: Date picker desabilitado
    placeholder: Selecione uma data
    restrictedPlaceholder: Janela permitida
    englishPlaceholder: Choose a date
    disabledPlaceholder: Campo bloqueado
    currentDateLabel: Data atual
    restrictedLabel: Data restrita
    englishLabel: Data em EN
    disabledLabel: Valor bloqueado
    defaultHelp: Clique no cabeçalho para trocar o mês e o ano rapidamente.
    restrictedHelp: Este exemplo limita a escolha entre minDate e maxDate.
    englishHelp: O locale altera labels do calendário e o formato da data exibida.
    disabledHelp: O campo mantém leitura do valor atual sem abrir o overlay.
    noneSelected: Nenhuma data selecionada
    partialRange: Período parcial ou não definido
    apiIntro: Use o li-date-picker quando o fluxo depende de uma única data com overlay leve, ngModel, locale e restrições básicas.
    apiInputsTitle: Inputs principais
    apiInputOne: O binding [(ngModel)] funciona com DateTime?.
    apiInputTwo: "[minDate] e [maxDate] restringem a janela navegável e selecionável."
    apiInputThree: "locale ajusta labels e formato visual da data."
    apiInputFour: "[disabled] impede abertura e seleção."
    apiBehaviorTitle: Comportamento
    apiBehaviorOne: Clique em um dia aplica imediatamente e fecha o overlay.
    apiBehaviorTwo: Clique no título do calendário para alternar entre dia, mês e ano.
    apiBehaviorThree: clear() continua disponível no rodapé para limpar o valor atual.
    apiBehaviorFour: valueChange e ngModel recebem a data normalizada sem horário.
    apiUsageExample: |
      // Exemplo de uso
      selectedDate = DateTime(2026, 3, 20);

      <li-date-picker
        [(ngModel)]="selectedDate"
        [minDate]="DateTime(2026, 3, 1)"
        [maxDate]="DateTime(2026, 3, 31)"
        locale="pt_BR">
      </li-date-picker>
    variationStandardTitle: Fluxo padrão
    variationStandardBody: Melhor opção para formulários em que o usuário escolhe uma data e segue adiante sem confirmação extra.
    variationLocaleTitle: Locale visual
    variationLocaleBody: A mesma API alterna labels, meses e formato exibido entre português e inglês.
    variationDisabledTitle: Estado bloqueado
    variationDisabledBody: Preserva o valor renderizado quando a data é informativa e não pode ser editada.
  carousel:
    title: Componentes
    subtitle: Carousel
    breadcrumb: Carousel com transições, captions e grid
    cardTitle: Variações do Carousel
    exampleLabel: Exemplo
    standardTitle: Carousel com Caption
    standardSubtitle: Indicadores e controles no padrão do Limitless, com caption branco centralizado dentro de cada slide.
    gridTitle: Carousel em Grid
    gridSubtitle: Você pode ter até 12 itens por slide usando o grid do Bootstrap, com row e col-* dentro de cada carousel-item.
    slideOneLabel: Arquitetura
    slideOneTitle: Primeiro slide
    slideOneBody: Indicadores pequenos na base e navegação lateral no padrão Bootstrap/Limitless.
    slideTwoLabel: Composição
    slideTwoTitle: Segundo slide
    slideTwoBody: O caption usa a classe correta do componente e respeita o posicionamento central do tema.
    slideThreeLabel: Entrega
    slideThreeTitle: Terceiro slide
    slideThreeBody: A navegação continua consistente mesmo com autoplay e troca manual.
    slideFourLabel: Referência
    slideFourTitle: Quarto slide
    slideFourBody: Estrutura equivalente ao exemplo clássico do arquivo components_carousel.html.
    gridSlideOneLabel: Coleção 1
    gridSlideTwoLabel: Coleção 2
    gridSlideThreeLabel: Coleção 3
    gridCardOneTitle: Workspace editorial
    gridCardOneBody: Painel visual para documentos, destaques e layouts mais narrativos.
    gridCardTwoTitle: Produto em destaque
    gridCardTwoBody: Estrutura pronta para vitrine de cards, mídia ou campanhas.
    gridCardThreeTitle: Jornada do usuário
    gridCardThreeBody: Um slide pode reunir várias entradas sem perder legibilidade.
    gridCardFourTitle: Identidade visual
    gridCardFourBody: Imagens maiores ajudam a validar contraste, recorte e sobreposição.
    gridCardFiveTitle: Módulos componíveis
    gridCardFiveBody: Carousel, Caption e Grid funcionam juntos sem markup acoplado.
    gridCardSixTitle: Demo executável
    gridCardSixBody: A vitrine deixa de ser estática e passa a mostrar comportamento real.
    gridCardSevenTitle: Coleção expandida
    gridCardSevenBody: Mais um slide para validar indicadores e transição contínua no grid.
    gridCardEightTitle: Navegação estável
    gridCardEightBody: Controles laterais permanecem previsíveis porque o row fica dentro do item.
    gridCardNineTitle: Estrutura correta
    gridCardNineBody: O item continua sendo o slide real; o grid é apenas conteúdo interno.
    fadeTitle: Carousel com Fade
    fadeSubtitle: Troca de slides por opacidade, sem deslocamento lateral, útil para hero banners e conteúdo com caption forte.
    fadeSlideOneLabel: Fade 1
    fadeSlideOneTitle: Fade editorial
    fadeSlideOneBody: O slide entra por opacidade, sem disputar atenção com movimento lateral.
    fadeSlideTwoLabel: Fade 2
    fadeSlideTwoTitle: Leitura mais limpa
    fadeSlideTwoBody: Funciona bem quando a imagem já tem muita textura e você quer uma troca mais discreta.
    fadeSlideThreeLabel: Fade 3
    fadeSlideThreeTitle: Transição suave
    fadeSlideThreeBody: O controle, indicadores e autoplay continuam iguais; muda apenas a linguagem visual da transição.
    zoomTitle: Carousel com Zoom
    zoomSubtitle: Entrada com escala e opacidade para uma sensação mais cinematográfica, sem alterar a estrutura do componente.
    zoomSlideOneLabel: Zoom 1
    zoomSlideOneTitle: Zoom in
    zoomSlideOneBody: O próximo slide entra com escala maior e assenta no plano principal ao fim da transição.
    zoomSlideTwoLabel: Zoom 2
    zoomSlideTwoTitle: Ênfase visual
    zoomSlideTwoBody: É uma boa variação para showcases de campanha, portfólio ou telas mais editoriais.
    zoomSlideThreeLabel: Zoom 3
    zoomSlideThreeTitle: Mesmo markup
    zoomSlideThreeBody: "A API continua igual: o efeito muda por input, sem markup alternativo nos itens."
    verticalTitle: Carousel Vertical
    verticalSubtitle: A transição acontece no eixo Y, útil quando a composição da página já tem muito movimento horizontal.
    verticalSlideOneLabel: Vertical 1
    verticalSlideOneTitle: Deslocamento vertical
    verticalSlideOneBody: O comportamento do carousel permanece o mesmo, mas a percepção muda completamente.
    verticalSlideTwoLabel: Vertical 2
    verticalSlideTwoTitle: Fluxo alternativo
    verticalSlideTwoBody: Esse modo pode combinar melhor com layouts em coluna e conteúdo mais documental.
    verticalSlideThreeLabel: Vertical 3
    verticalSlideThreeTitle: API consistente
    verticalSlideThreeBody: Assim como no zoom, a mudança está encapsulada no componente e pode ser reutilizada em outras telas.
    blurTitle: Carousel com Blur
    blurSubtitle: Uma transição com desfoque e opacidade que suaviza a troca entre imagens mais detalhadas.
    blurSlideOneLabel: Blur 1
    blurSlideOneTitle: Entrada difusa
    blurSlideOneBody: O slide emerge com blur reduzido e opacidade crescente, criando uma mudança mais atmosférica.
    blurSlideTwoLabel: Blur 2
    blurSlideTwoTitle: Textura sob controle
    blurSlideTwoBody: Esse modo funciona bem quando a fotografia tem muito detalhe e o fade puro parece discreto demais.
    blurSlideThreeLabel: Blur 3
    blurSlideThreeTitle: Variação reutilizável
    blurSlideThreeBody: O efeito continua encapsulado no componente e pode ser aplicado em qualquer carousel via input.
    parallaxTitle: Carousel com Parallax
    parallaxSubtitle: Desloca a imagem com profundidade aparente, criando uma transição mais espacial entre os slides.
    parallaxSlideOneLabel: Parallax 1
    parallaxSlideOneTitle: Profundidade lateral
    parallaxSlideOneBody: O slide entra com deslocamento e escala levemente maior, sugerindo um plano de fundo em movimento.
    parallaxSlideTwoLabel: Parallax 2
    parallaxSlideTwoTitle: Movimento editorial
    parallaxSlideTwoBody: Esse modo funciona bem em vitrines visuais e páginas onde a troca de imagem precisa parecer mais física.
    parallaxSlideThreeLabel: Parallax 3
    parallaxSlideThreeTitle: Camadas sutis
    parallaxSlideThreeBody: A sensação de parallax é discreta e reutilizável, sem exigir markup especial nos itens.
