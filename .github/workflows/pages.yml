name: Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart 3.6.2
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.6.2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install package dependencies
        run: dart pub get

      - name: Install example dependencies
        working-directory: example
        run: dart pub get

      - name: Build example for Pages
        working-directory: example
        run: dart run build_runner build --release --delete-conflicting-outputs --output web:build

      - name: Prepare combined Pages artifact
        shell: pwsh
        run: ./scripts/prepare-pages.ps1 -PagesBasePath "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
