<div *ngIf="isMounted"
     [class]="resolvedToastClasses"
     role="alert"
     [attr.aria-live]="ariaLive"
     aria-atomic="true">
  <div *ngIf="hasHeader" [class]="resolvedHeaderClasses">
    <i *ngIf="hasIcon" [class]="resolvedIconClasses"></i>
    <div *ngIf="header.trim().isNotEmpty" class="fw-semibold me-auto">{{ header }}</div>
    <span *ngIf="hasBadge" [class]="resolvedBadgeClasses">{{ badgeText }}</span>
    <small *ngIf="hasHelperText" [class]="resolvedHelperTextClasses">{{ helperText }}</small>
    <button *ngIf="dismissible"
            type="button"
            [class]="resolvedCloseButtonClasses"
            aria-label="Close"
            (click)="hide()"></button>
  </div>

  <div *ngIf="hasBody" [class]="resolvedBodyClasses">
    {{ body }}
  </div>

  <ng-content></ng-content>
</div>
