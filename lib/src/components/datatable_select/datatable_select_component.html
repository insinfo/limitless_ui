<div class="datatable-select-wrapper">
    <button type="button" #triggerButton [class]="resolvedTriggerClass"
        [disabled]="isDisabled" (click)="openModal()" tabindex="0"
        role="combobox" aria-haspopup="dialog"
        [attr.aria-expanded]="modal?.isOpen == true ? 'true' : 'false'"
        [attr.aria-describedby]="resolvedDescribedBy"
        [attr.aria-invalid]="effectiveInvalid ? 'true' : null"
        [attr.data-invalid]="effectiveInvalid ? 'true' : null">
        <span class="datatable-select-value"
            [class.datatable-select-placeholder]="selectedLabel.isEmpty">
            <span *ngIf="triggerTemplate != null">
                <template [ngTemplateOutlet]="triggerTemplate?.templateRef"
                    [ngTemplateOutletValue]="triggerContext">
                </template>
            </span>
            <span *ngIf="triggerTemplate == null">
                {{selectedLabel.isEmpty ? resolvedPlaceholder : selectedLabel}}
            </span>
        </span>
        <span class="datatable-select-icons">
            <i *ngIf="selectedValue != null" class="ph ph-x datatable-select-clear"
                (click)="onClearClick($event)" [attr.title]="resolvedClearButtonLabel"
                [attr.aria-label]="resolvedClearButtonLabel"></i>
        </span>
    </button>
    <div *ngIf="showErrorFeedback" [class]="resolvedFeedbackClass">{{ errorText }}</div>
    <div *ngIf="hasHelperText" class="form-text mt-1">{{ helperText }}</div>
</div>

<li-modal #modal
    [title-text]="resolvedTitleText"
    [size]="modalSize"
    [fullScreenOnMobile]="fullScreenOnMobile"
    [dialogScrollable]="false"
    [lazyContent]="true"
    [enableModalBodyClass]="false"
    [closeOnBackdropClick]="true"
    [enableRoundedCorners]="true">

    <template [ngTemplateOutlet]="modalContentTemplate == null ? null : modalContentTemplate?.templateRef"
        [ngTemplateOutletValue]="modalContext">
    </template>

    <li-datatable *ngIf="modalContentTemplate == null" #datatable
        [dataTableFilter]="dataTableFilter"
        [settings]="settings"
        [data]="data"
        [searchInFields]="searchInFields"
        [limitPerPageOptions]="limitPerPageOptions"
        [showCheckboxToSelectRow]="showCheckboxToSelectRow"
        [showExportMenu]="showExportMenu"
        [searchPlaceholder]="resolvedSearchPlaceholder"
        [gridMode]="gridMode"
        [responsiveCollapse]="responsiveCollapse"
        [disableRowClick]="false"
        (onRowClick)="onDatatableRowClick($event)"
        (dataRequest)="onDatatableDataRequest($event)"
        (limitChange)="onDatatableLimitChange($event)"
        (searchRequest)="onDatatableSearchRequest($event)">
    </li-datatable>

</li-modal>
