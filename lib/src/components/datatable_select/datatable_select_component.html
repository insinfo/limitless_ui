<div class="datatable-select-wrapper">
    <div *ngIf="usesAddonTriggerIcon" class="input-group">
        <button type="button" #triggerButton [attr.data-li-form-focus-target]="'true'" [class]="resolvedTriggerClass"
            [disabled]="isDisabled" (click)="openModal()" tabindex="0"
            role="combobox" aria-haspopup="dialog"
            [attr.aria-expanded]="modal?.isOpen == true ? 'true' : 'false'"
            [attr.aria-describedby]="resolvedDescribedBy"
            [attr.aria-invalid]="effectiveInvalid ? 'true' : null"
            [attr.data-invalid]="effectiveInvalid ? 'true' : null">
            <span class="datatable-select-value"
                [class.datatable-select-placeholder]="selectedLabel.isEmpty">
                <span *ngIf="triggerTemplate != null">
                    <template [ngTemplateOutlet]="triggerTemplate?.templateRef"
                        [ngTemplateOutletValue]="triggerContext">
                    </template>
                </span>
                <span *ngIf="triggerTemplate == null">
                    <span *ngIf="!multiple">
                        {{selectedLabel.isEmpty ? resolvedPlaceholder : selectedLabel}}
                    </span>
                    <span *ngIf="multiple && selectedLabels.isEmpty"
                        class="datatable-select-placeholder">
                        {{ resolvedPlaceholder }}
                    </span>
                    <span *ngIf="multiple && selectedLabels.isNotEmpty" class="datatable-select-chips d-flex align-items-center flex-nowrap gap-1">
                        <span *ngFor="let label of selectedLabels; let i = index"
                            class="badge rounded-pill d-inline-flex align-items-center datatable-select-chip"
                            [hidden]="i > 1">
                            {{ label }}
                        </span>
                        <span *ngIf="selectedLabels.length > 2"
                            class="badge rounded-pill d-inline-flex align-items-center datatable-select-chip datatable-select-chip--muted">
                            +{{ selectedLabels.length - 2 }}
                        </span>
                    </span>
                </span>
            </span>
            <span *ngIf="showsClearButton"
                class="datatable-select-clear"
                role="button"
                tabindex="0"
                [attr.aria-label]="resolvedClearButtonLabel"
                (click)="onClearClick($event)">
                <i class="ph ph-x"></i>
            </span>
        </button>
        <span class="input-group-text datatable-select-trigger-addon" aria-hidden="true">
            <i [class]="resolvedTriggerIconClass"></i>
        </span>
    </div>

    <button *ngIf="!usesAddonTriggerIcon" type="button" #triggerButton [attr.data-li-form-focus-target]="'true'" [class]="resolvedTriggerClass"
        [disabled]="isDisabled" (click)="openModal()" tabindex="0"
        role="combobox" aria-haspopup="dialog"
        [attr.aria-expanded]="modal?.isOpen == true ? 'true' : 'false'"
        [attr.aria-describedby]="resolvedDescribedBy"
        [attr.aria-invalid]="effectiveInvalid ? 'true' : null"
        [attr.data-invalid]="effectiveInvalid ? 'true' : null">
        <span class="datatable-select-value"
            [class.datatable-select-placeholder]="selectedLabel.isEmpty">
            <span *ngIf="triggerTemplate != null">
                <template [ngTemplateOutlet]="triggerTemplate?.templateRef"
                    [ngTemplateOutletValue]="triggerContext">
                </template>
            </span>
            <span *ngIf="triggerTemplate == null">
                <span *ngIf="!multiple">
                    {{selectedLabel.isEmpty ? resolvedPlaceholder : selectedLabel}}
                </span>
                <span *ngIf="multiple && selectedLabels.isEmpty">
                    {{ resolvedPlaceholder }}
                </span>
                <span *ngIf="multiple && selectedLabels.isNotEmpty" class="datatable-select-chips d-flex align-items-center flex-nowrap gap-1">
                    <span *ngFor="let label of selectedLabels; let i = index"
                        class="badge rounded-pill d-inline-flex align-items-center datatable-select-chip"
                        [hidden]="i > 1">
                        {{ label }}
                    </span>
                    <span *ngIf="selectedLabels.length > 2"
                        class="badge rounded-pill d-inline-flex align-items-center datatable-select-chip datatable-select-chip--muted">
                        +{{ selectedLabels.length - 2 }}
                    </span>
                </span>
            </span>
        </span>
        <span *ngIf="showsClearButton"
            class="datatable-select-clear"
            role="button"
            tabindex="0"
            [attr.aria-label]="resolvedClearButtonLabel"
            (click)="onClearClick($event)">
            <i class="ph ph-x"></i>
        </span>
        <span *ngIf="usesOverlayTriggerIcon" class="datatable-select-trigger-icon" aria-hidden="true">
            <i [class]="resolvedTriggerIconClass"></i>
        </span>
    </button>
    <div *ngIf="showErrorFeedback" [class]="resolvedFeedbackClass">{{ effectiveErrorText }}</div>
    <div *ngIf="hasHelperText" class="form-text mt-1">{{ helperText }}</div>
</div>

<li-modal #modal
    [title-text]="resolvedTitleText"
    [size]="modalSize"
    [fullScreenOnMobile]="fullScreenOnMobile"
    [compactHeader]="modalCompactHeader"
    [smallHeader]="modalSmallHeader"
    [dialogScrollable]="false"
    [lazyContent]="true"
    [enableModalBodyClass]="false"
    [closeOnBackdropClick]="true"
    [enableRoundedCorners]="true"
    (close)="onModalClosed()">

    <template [ngTemplateOutlet]="modalContentTemplate == null ? null : modalContentTemplate?.templateRef"
        [ngTemplateOutletValue]="modalContext">
    </template>

    <li-datatable *ngIf="modalContentTemplate == null" #datatable
        [dataTableFilter]="dataTableFilter"
        [settings]="settings"
        [data]="data"
        [searchInFields]="searchInFields"
        [limitPerPageOptions]="limitPerPageOptions"
        [showCheckboxToSelectRow]="useCheckboxSelection"
        [allowSingleSelectionOnly]="false"
        [showExportMenu]="showExportMenu"
        [headerTemplate]="datatableHeaderTemplate?.templateRef"
        [footerTemplate]="datatableFooterTemplate?.templateRef"
        [searchPlaceholder]="resolvedSearchPlaceholder"
        [gridMode]="gridMode"
        [responsiveCollapse]="responsiveCollapse"
        [requestDataOnItemsPerPageChange]="requestDataOnItemsPerPageChange"
        [disableRowClick]="multiple"
        (onRowClick)="onDatatableRowClick($event)"
        (selectAll)="onDatatableSelectionChange($event)"
        (dataRequest)="onDatatableDataRequest($event)"
        (limitChange)="onDatatableLimitChange($event)"
        (searchRequest)="onDatatableSearchRequest($event)">
    </li-datatable>

    <div *ngIf="modalContentTemplate == null && multiple" class="modal-footer border-top-0 px-3 py-2 gap-2">
        <button type="button"
            class="btn btn-light btn-sm"
            (click)="clearModalSelection()">
            {{ resolvedClearButtonLabel }}
        </button>
        <button type="button"
            class="btn btn-primary btn-sm"
            (click)="applyModalSelection()">
            {{ resolvedConfirmButtonLabel }}
        </button>
    </div>

</li-modal>
