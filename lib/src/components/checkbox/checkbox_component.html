<label [class]="resolvedContainerClass">
  <input
      #inputElement
      [attr.data-li-form-focus-target]="'true'"
      type="checkbox"
      [id]="resolvedId"
      [attr.name]="resolvedName"
      [attr.aria-label]="resolvedAriaLabel"
      [attr.aria-describedby]="resolvedDescribedBy"
      [attr.aria-invalid]="resolvedAriaInvalid"
      [attr.data-invalid]="resolvedDataInvalidAttr"
      [class]="resolvedInputClass"
      [checked]="checked"
      [disabled]="disabled"
      [required]="required"
      (change)="handleChange(inputElement.checked)"
      (blur)="handleBlur()">
  <span [class]="resolvedLabelClass">{{ label }}</span>
</label>
<div *ngIf="showErrorFeedback" [class]="resolvedFeedbackClass">{{ effectiveErrorText }}</div>
<div *ngIf="hasHelperText" class="form-text mt-1">{{ helperText }}</div>
