<div class="time-picker-wrapper">
    <div #triggerElement class="input-group" [class.disabled]="isDisabled" (click)="toggleOpen()">
        <input type="text" [class]="resolvedInputClass" [value]="displayValue" [placeholder]="effectivePlaceholder"
            readonly [disabled]="isDisabled" [required]="required"
            [attr.aria-describedby]="resolvedDescribedBy"
            [attr.aria-invalid]="effectiveInvalid ? 'true' : null"
            [attr.data-invalid]="effectiveInvalid ? 'true' : null">
        <button type="button" class="btn time-picker-trigger-button" tabindex="-1" [disabled]="isDisabled">
            <i class="ph ph-clock"></i>
        </button>
    </div>
    <div *ngIf="showErrorFeedback" [class]="resolvedFeedbackClass">{{ errorText }}</div>
    <div *ngIf="hasHelperText" class="form-text mt-1">{{ helperText }}</div>

    <div #panelElement class="time-picker-panel daterangepicker single ltr show-calendar opensright" [class.is-open]="isOpen">
        <div class="time-picker-panel-shell">
            <div class="time-picker-title">{{ titleLabel }}</div>

            <div class="time-picker-display-row">
                <input #hourInput type="text"
                    inputmode="numeric"
                    maxlength="2"
                    class="time-picker-display-chip"
                    [class.active]="isHourMode"
                    [value]="editableHourText"
                    (focus)="onHourFocus()"
                    (click)="setHourMode()"
                    (input)="onHourInput(hourInput.value)"
                    (blur)="onHourBlur()"
                    (keydown)="onChipKeyDown($event, true)">
                <div class="time-picker-colon">:</div>
                <input #minuteInput type="text"
                    inputmode="numeric"
                    maxlength="2"
                    class="time-picker-display-chip"
                    [class.active]="isMinuteMode"
                    [value]="editableMinuteText"
                    (focus)="onMinuteFocus()"
                    (click)="setMinuteMode()"
                    (input)="onMinuteInput(minuteInput.value)"
                    (blur)="onMinuteBlur()"
                    (keydown)="onChipKeyDown($event, false)">
                <div *ngIf="showMeridiem" class="time-picker-meridiem">
                    <button type="button" class="time-picker-meridiem-button" [class.active]="!isPm" (click)="setMeridiem(false)">
                        {{ amLabel }}
                    </button>
                    <button type="button" class="time-picker-meridiem-button" [class.active]="isPm" (click)="setMeridiem(true)">
                        {{ pmLabel }}
                    </button>
                </div>
            </div>

            <div #clockFaceElement class="time-picker-clock" (mousedown)="onClockMouseDown($event)" (touchstart)="onClockTouchStart($event)">
                <div class="time-picker-hand"
                    [style.height.%]="handLengthPercent"
                    [style.transform]="'rotate(' + handTransformDegrees.toString() + 'deg)'">
                    <div *ngIf="showFloatingSelector" class="time-picker-selector">
                        <div class="time-picker-selector-label" [class.small-selector]="useCompactSelector">
                            <span *ngIf="selectorHasText" [style.transform]="floatingSelectorLabelTransform">
                                {{ floatingSelectorText }}
                            </span>
                        </div>
                    </div>
                </div>
                <div class="time-picker-center-dot"></div>
                <button type="button" *ngFor="let label of visibleDialLabels; trackBy: trackByDialLabel"
                    [class]="dialLabelClass(label)"
                    [style.left.%]="label.leftPercent" [style.top.%]="label.topPercent" (click)="onDialLabelClick(label, $event)">
                    {{ label.label }}
                </button>
            </div>

            <div class="time-picker-footer">
                <button type="button" class="btn btn-link" (click)="close()">{{ cancelLabel }}</button>
                <button type="button" class="btn btn-link text-primary" (click)="apply()">{{ okLabel }}</button>
            </div>
        </div>
    </div>
</div>
