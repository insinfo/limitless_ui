<div class="dropdown-collection">
    <button type="button" #dropdownButton class="form-select dropdown-button"
        role="combobox"
        [attr.aria-expanded]="dropdownOpen.toString()"
        [attr.aria-controls]="listboxId"
        aria-haspopup="listbox"
        (click)="toggleDropdown()" (clickOutside)="closeDropdown()" tabindex="0"
        [disabled]="isDisabled">

        <span class="dropdown-value" *ngIf="selectedValues.isEmpty == true">{{ placeholder}}</span>

        <span class="dropdown-values" *ngIf="selectedValues.isNotEmpty == true">
            <span class="badge text-teal bg-teal bg-opacity-20 me-2" *ngFor="let selVal of selectedLabels">
                {{ selVal }} 
            </span>
        </span>

    </button>
    <div #dropdownContainer class="dropdown-container dropdown-menu"
        [class.dropdown-open]="dropdownOpen">
        <ul [attr.id]="listboxId" role="listbox" aria-multiselectable="true">
            <!-- multiple -->
            <li class="dropdown-item" *ngFor="let o of options; let idx = index"
                [attr.id]="optionId(idx)"
                [attr.aria-selected]="o.selected.toString()"
                tabindex="-1" (click)="onLiClickHandle($event,o)"
                role="option" [hidden]="o.visible == false">
                <input (click)="onCheckboxClickHandle($event,o)" [checked]="o.selected" class="form-check-input m-0 me-3" type="checkbox" tabindex="-1">
                <span class="dropdown-item-label">{{o.text}}</span>
            </li>
        </ul>
    </div>
</div>
